<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceType Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="title-bar">
        <div class="title-text">VoiceType Pro</div>
        <div class="window-controls">
            <button id="minimize-btn" class="control-btn minimize" aria-label="Minimize">─</button>
            <button id="close-btn" class="control-btn close" aria-label="Close">✕</button>
        </div>
    </div>

    <div class="app-container">
        <!-- Main View -->
        <main id="main-view" class="view active">
            <div class="top-controls">
                <div class="status-pill" id="status-pill">
                    <span class="status-dot stopped" id="status-dot"></span>
                    <span class="status-text" id="status-text">Stopped</span>
                </div>
                <div class="language-selector-main">
                    <select id="main-lang-select" class="lang-dropdown">
                        <option value="en-US">English (US)</option>
                        <option value="en-GB">English (UK)</option>
                        <option value="bn-BD">Bangla (Bangladesh)</option>
                        <option value="bn-IN">Bangla (India)</option>
                        <option value="es-ES">Spanish</option>
                        <option value="fr-FR">French</option>
                        <option value="de-DE">German</option>
                        <option value="hi-IN">Hindi</option>
                    </select>
                </div>
            </div>

            <div class="mic-section">
                <div class="mic-pulse" id="mic-pulse"></div>
                <button id="mic-btn" class="mic-btn" aria-label="Toggle Microphone">
                    <img src="../assets/mic.svg" alt="Microphone" />
                </button>
            </div>

            <div class="waveform-container">
                <canvas id="waveform-canvas"></canvas>
            </div>
            
            <div class="transcript-preview" id="transcript-preview">
                Ready to type...
            </div>
        </main>

        <!-- Settings Panel -->
        <aside id="settings-panel" class="view settings">
            <h2>Settings</h2>
            
            <h3 class="section-title">General</h3>
            
            <div class="setting-group checkbox-group">
                <label for="always-on-top">Always on Top</label>
                <label class="switch">
                    <input type="checkbox" id="always-on-top" checked>
                    <span class="slider round"></span>
                </label>
            </div>

            <h3 class="section-title">Appearance</h3>

            <div class="setting-group">
                <label for="opacity-range">Window Opacity</label>
                <input type="range" id="opacity-range" min="0.2" max="1" step="0.1" value="1">
            </div>

            <div class="setting-group">
                <label>Theme Color</label>
                <div class="color-picker">
                    <button class="color-btn active" data-color="#1e1e2e" style="background: #1e1e2e;"></button>
                    <button class="color-btn" data-color="#181825" style="background: #181825;"></button>
                    <button class="color-btn" data-color="#11111b" style="background: #11111b;"></button>
                    <button class="color-btn" data-color="#000000" style="background: #000000;"></button>
                </div>
            </div>
            
            <div class="setting-group info-group">
                <p class="shortcut-info">Shortcut to toggle: <kbd>Ctrl+Shift+Space</kbd></p>
                <p class="version" id="app-version">Version 1.0.0</p>
            </div>
        </aside>

        <!-- About Panel -->
        <aside id="about-panel" class="view about">
            <div class="about-card">
                <div class="profile-img-container">
                    <div class="glow-ring"></div>
                    <img src="../assets/profile.png" alt="Md. Pranto Islam" class="profile-img">
                </div>
                
                <h1 class="dev-name">Md. Pranto Islam</h1>
                <p class="dev-title">Software Developer | AI Enthusiast</p>
                
                <div class="divider"></div>

                    </a>
                </div>
                
                <button class="contact-btn" data-url="https://github.com/pranto2050">Contact Me</button>
            </div>
        </aside>

        <nav class="bottom-nav">
            <button id="nav-main" class="nav-btn active">Home</button>
            <button id="nav-settings" class="nav-btn">Settings</button>
            <button id="nav-about" class="nav-btn">About</button>
        </nav>
    </div>

    <script src="waveform.js"></script>
    <script src="settings.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
